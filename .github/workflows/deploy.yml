name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group --no-times ./ ${{ secrets.DEPLOY_PATH }}/ --exclude='.git' --exclude='.github'
